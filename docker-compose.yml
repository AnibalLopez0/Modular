version: '3'

services:
  web:
    build: .
    ports:
      - "80:80"
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: modular
    volumes:
      - mysql_data:/var/lib/mysql
      - ./terapia_db.sql:/docker-entrypoint-initdb.d/terapia_db.sql

volumes:
  mysql_data:
